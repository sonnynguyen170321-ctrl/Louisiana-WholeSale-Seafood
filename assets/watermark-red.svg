<?xml version="1.0" encoding="UTF-8"?>
<!-- Watermark: Red on transparent — use over light/white backgrounds -->
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Top arc: text follows upper half of circle, reads L→R at top -->
        <path id="wr-top" d="M 75,250 A 175,175 0 0,1 425,250"/>
        <!-- Bottom arc: clockwise through bottom half, text reads L→R at bottom -->
        <path id="wr-bot" d="M 70,250 A 180,180 0 0,1 430,250"/>
    </defs>

    <g opacity="0.35" fill="#EC1D27" stroke="none">

        <!-- ── Double ring border ── -->
        <circle cx="250" cy="250" r="232" fill="none" stroke="#EC1D27" stroke-width="9"/>
        <circle cx="250" cy="250" r="218" fill="none" stroke="#EC1D27" stroke-width="3"/>

        <!-- ── Top arc label ── -->
        <text font-family="Georgia,'Times New Roman',serif" font-size="30" font-weight="700"
              letter-spacing="8" fill="#EC1D27">
            <textPath href="#wr-top" startOffset="50%" text-anchor="middle">LC WHOLESALE</textPath>
        </text>

        <!-- ── Crab illustration (centered at 250, 218) ── -->
        <g transform="translate(250,218)" fill="#EC1D27">
            <!-- Body -->
            <ellipse cx="0" cy="8" rx="52" ry="38"/>
            <!-- Shell ridge detail -->
            <path d="M-28,-2 Q0,-25 28,-2" fill="none" stroke="#EC1D27" stroke-width="5"/>
            <!-- Eye stalks -->
            <line x1="-11" y1="-28" x2="-18" y2="-44" stroke="#EC1D27" stroke-width="5" stroke-linecap="round"/>
            <line x1="11"  y1="-28" x2="18"  y2="-44" stroke="#EC1D27" stroke-width="5" stroke-linecap="round"/>
            <!-- Eyes -->
            <circle cx="-20" cy="-50" r="7"/>
            <circle cx="20"  cy="-50" r="7"/>
            <!-- Left claw -->
            <path d="M-52,0 C-64,-16 -90,-22 -98,-8 C-106,4 -98,16 -84,20 C-70,24 -58,12 -52,4Z"/>
            <!-- Right claw -->
            <path d="M52,0 C64,-16 90,-22 98,-8 C106,4 98,16 84,20 C70,24 58,12 52,4Z"/>
            <!-- Left legs (top to bottom) -->
            <line x1="-48" y1="3"  x2="-82" y2="-10" stroke="#EC1D27" stroke-width="6" stroke-linecap="round"/>
            <line x1="-50" y1="14" x2="-85" y2="14"  stroke="#EC1D27" stroke-width="6" stroke-linecap="round"/>
            <line x1="-48" y1="25" x2="-80" y2="38"  stroke="#EC1D27" stroke-width="5" stroke-linecap="round"/>
            <line x1="-42" y1="37" x2="-66" y2="53"  stroke="#EC1D27" stroke-width="5" stroke-linecap="round"/>
            <!-- Right legs -->
            <line x1="48"  y1="3"  x2="82"  y2="-10" stroke="#EC1D27" stroke-width="6" stroke-linecap="round"/>
            <line x1="50"  y1="14" x2="85"  y2="14"  stroke="#EC1D27" stroke-width="6" stroke-linecap="round"/>
            <line x1="48"  y1="25" x2="80"  y2="38"  stroke="#EC1D27" stroke-width="5" stroke-linecap="round"/>
            <line x1="42"  y1="37" x2="66"  y2="53"  stroke="#EC1D27" stroke-width="5" stroke-linecap="round"/>
        </g>

        <!-- ── SEAFOOD headline ── -->
        <text x="250" y="336" text-anchor="middle"
              font-family="'Arial Black',Impact,sans-serif"
              font-size="60" font-weight="900" letter-spacing="1" fill="#EC1D27">SEAFOOD</text>

        <!-- ── Phone number ── -->
        <text x="250" y="372" text-anchor="middle"
              font-family="Arial,Helvetica,sans-serif"
              font-size="26" font-weight="700" fill="#EC1D27">(214) 846-0985</text>

        <!-- ── Bottom arc tagline ── -->
        <text font-family="Georgia,'Times New Roman',serif"
              font-size="21" font-style="italic" fill="#EC1D27">
            <textPath href="#wr-bot" startOffset="50%" text-anchor="middle">Best Seafood Quality</textPath>
        </text>

    </g>
</svg>
