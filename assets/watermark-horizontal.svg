<?xml version="1.0" encoding="UTF-8"?>
<!-- Watermark: Horizontal lockup — for invoices, packing slips, document headers -->
<svg viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <path id="wh-top" d="M 18,90 A 72,72 0 0,1 162,90"/>
        <path id="wh-bot" d="M 16,90 A 74,74 0 0,1 164,90"/>
    </defs>

    <!-- ── Left: Mini circular seal badge ── -->
    <g opacity="0.90" fill="#EC1D27" stroke="none">

        <!-- Ring -->
        <circle cx="90" cy="90" r="82" fill="none" stroke="#EC1D27" stroke-width="4"/>
        <circle cx="90" cy="90" r="74" fill="none" stroke="#EC1D27" stroke-width="1.5"/>

        <!-- Top arc text -->
        <text font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="700"
              letter-spacing="3.5" fill="#EC1D27">
            <textPath href="#wh-top" startOffset="50%" text-anchor="middle">LC WHOLESALE</textPath>
        </text>

        <!-- Mini crab (centered at 90, 83) -->
        <g transform="translate(90,83)" fill="#EC1D27">
            <ellipse cx="0" cy="3" rx="20" ry="15"/>
            <path d="M-11,-1 Q0,-10 11,-1" fill="none" stroke="#EC1D27" stroke-width="2"/>
            <line x1="-4"  y1="-11" x2="-7"  y2="-18" stroke="#EC1D27" stroke-width="2" stroke-linecap="round"/>
            <line x1="4"   y1="-11" x2="7"   y2="-18" stroke="#EC1D27" stroke-width="2" stroke-linecap="round"/>
            <circle cx="-8" cy="-20" r="3"/>
            <circle cx="8"  cy="-20" r="3"/>
            <path d="M-20,0 C-25,-6 -36,-9 -40,-3 C-43,2 -40,7 -34,8 C-28,10 -23,5 -20,2Z"/>
            <path d="M20,0 C25,-6 36,-9 40,-3 C43,2 40,7 34,8 C28,10 23,5 20,2Z"/>
            <line x1="-19" y1="1"  x2="-32" y2="-4" stroke="#EC1D27" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="-20" y1="6"  x2="-33" y2="5"  stroke="#EC1D27" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="-18" y1="11" x2="-30" y2="16" stroke="#EC1D27" stroke-width="2"   stroke-linecap="round"/>
            <line x1="19"  y1="1"  x2="32"  y2="-4" stroke="#EC1D27" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="20"  y1="6"  x2="33"  y2="5"  stroke="#EC1D27" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="18"  y1="11" x2="30"  y2="16" stroke="#EC1D27" stroke-width="2"   stroke-linecap="round"/>
        </g>

        <!-- SEAFOOD text in mini badge -->
        <text x="90" y="124" text-anchor="middle"
              font-family="'Arial Black',Impact,sans-serif"
              font-size="22" font-weight="900" letter-spacing="0.5" fill="#EC1D27">SEAFOOD</text>

        <!-- Bottom arc tagline -->
        <text font-family="Georgia,'Times New Roman',serif"
              font-size="9" font-style="italic" fill="#EC1D27">
            <textPath href="#wh-bot" startOffset="50%" text-anchor="middle">Best Seafood Quality</textPath>
        </text>

    </g>

    <!-- ── Vertical divider ── -->
    <line x1="188" y1="24" x2="188" y2="156" stroke="#EC1D27" stroke-width="1.5" opacity="0.6"/>

    <!-- ── Right: Text block ── -->
    <g fill="#1E252D">
        <!-- Brand name -->
        <text x="208" y="52"
              font-family="Georgia,'Times New Roman',serif"
              font-size="13" font-weight="700" letter-spacing="4" fill="#EC1D27" opacity="0.85">LOUISIANA</text>
        <text x="208" y="80"
              font-family="'Arial Black',Impact,sans-serif"
              font-size="32" font-weight="900" letter-spacing="1" fill="#EC1D27">WHOLESALE</text>
        <text x="208" y="104"
              font-family="'Arial Black',Impact,sans-serif"
              font-size="32" font-weight="900" letter-spacing="1" fill="#EC1D27">SEAFOOD</text>

        <!-- Thin rule -->
        <line x1="208" y1="114" x2="660" y2="114" stroke="#EC1D27" stroke-width="1" opacity="0.40"/>

        <!-- Contact info row -->
        <text x="208" y="134"
              font-family="Arial,Helvetica,sans-serif"
              font-size="13" fill="#555555">
            <tspan>(214) 846-0985</tspan>
            <tspan dx="18" fill="#EC1D27" opacity="0.5">|</tspan>
            <tspan dx="18">(337) 453-7348 wholesale</tspan>
            <tspan dx="18" fill="#EC1D27" opacity="0.5">|</tspan>
            <tspan dx="18">louisianawholesaleseafood@gmail.com</tspan>
        </text>
        <text x="208" y="154"
              font-family="Arial,Helvetica,sans-serif"
              font-size="12" fill="#888888" font-style="italic">
            200 Coit Rd, Plano, TX 75075  ·  Fat Oysters Restaurant: (972) 212-4266
        </text>
    </g>
</svg>
